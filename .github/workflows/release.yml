# Modified: 2026-07-15
name: Release Obsidian plugin

on:
  push:
    tags:
      - '*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Verify release version
        run: |
          manifest_version="$(node -p "require('./manifest.json').version")"
          test "$GITHUB_REF_NAME" = "$manifest_version"
      - name: Attest release assets
        uses: actions/attest@v4
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css
      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --notes "Initial public release of nPort RF Analysis for Obsidian desktop. Run nP JavaScript or declarative RF analyses from Markdown and render SVG charts, Smith charts, and tables." \
            main.js manifest.json styles.css
